services:
  - type: web
    name: tilawah-share-viewer
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        value: https://tilawah-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Per-page fonts and layout JSON are content-stable (fixed mushaf), keyed
      # by page number. Render serves them max-age=0 by default, forcing a
      # revalidation round-trip on every flip/reload. Cache them immutably so the
      # browser reuses them across reloads and sessions with no network wait.
      # (If a font/page file is ever regenerated, bump its path or filename.)
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /pages/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
