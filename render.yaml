services:
  - type: web
    name: tilawah-share-viewer
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        value: https://tilawah-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
